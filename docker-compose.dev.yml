services:
  api:
    container_name: strapi
    restart: unless-stopped
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL}
    environment:
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      NODE_ENV: ${NODE_ENV}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ./.env:/usr/src/app/dist/apps/api/.env
      - ./public/uploads:/usr/src/app/dist/apps/api/public/uploads
      - ./data:/usr/src/app/dist/apps/api/data
      # - ./api/config:/usr/src/app/dist/apps/api/config
      # - ./api/src:/usr/src/app/dist/apps/api/src
    ports:
      - 1337:1337
    command: ['bun', 'run', 'start']
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - db
  client:
    container_name: astro
    env_file: .env
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      target: astro
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL}
        PUBLIC_URL: ${PUBLIC_URL:-http://127.0.0.1:4125}
        PUBLIC_OUTLINE_URL: ${PUBLIC_OUTLINE_URL:-}
    environment:
      PRIVATE_BACKEND_API_URL: http://api:1337
      PORT: 4125
    ports:
      - 4125:4125
    depends_on:
      - api
  db:
    image: postgres
    ports:
      - 5433:5432
    environment:
      - POSTGRES_PASSWORD=0000
      - POSTGRES_USER=postgres
      - POSTGRES_DB=database
