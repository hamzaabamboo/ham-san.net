schema:
  - 'https://api.ham-san.net/graphql'

documents:
  - ../../libs/graphql/**/*.gql

generates:
  src/graphql/generated/client.ts:
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-graphql-request'
    config:
      scalars:
        Date: string
        DateTime: string
        I18NLocaleCode: string
