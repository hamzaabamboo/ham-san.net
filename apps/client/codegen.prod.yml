schema:
  - 'https://api.ham-san.net/graphql'

documents:
  - ../../libs/graphql/**/*.gql

generates:
  src/graphql/generated/client.ts:
    config:
      clientPath: '../client'
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'graphql-codegen-svelte-apollo'
  src/graphql/generated/server.ts:
    config:
      useTypeImports: true
    plugins:
      - 'typescript'
      - 'typescript-operations'
      - 'typescript-graphql-request'
